name: Tests

on: [push, pull_request]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          source .venv/bin/activate
          PYTHONPATH=src pytest --cov=advanced_seo_mcp --cov-report=xml --cov-fail-under=70 -v

      - name: Ruff check
        run: |
          source .venv/bin/activate
          ruff check src/ tests/

      - name: Mypy type check
        run: |
          source .venv/bin/activate
          PYTHONPATH=src mypy src/ --ignore-missing-imports

      - name: Build package
        run: |
          source .venv/bin/activate
          python -m build

      - name: Smoke import
        run: |
          source .venv/bin/activate
          python -c "import advanced_seo_mcp"
          python -c "from advanced_seo_mcp.server import mcp; print(mcp.name)"
