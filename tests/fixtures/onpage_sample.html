<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample SEO Page - Test Content</title>
    <meta name="description" content="This is a sample page for testing on-page SEO analysis.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://example.com/sample-page">
    <link rel="sitemap" href="https://example.com/sitemap.xml">
    <meta property="og:title" content="Sample SEO Page">
    <meta property="og:description" content="Open Graph description for testing.">
    <meta property="og:image" content="https://example.com/og-image.jpg">
    <meta name="twitter:card" content="summary_large_image">
</head>
<body>
    <header>
        <nav>
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/contact">Contact</a>
        </nav>
    </header>
    <main>
        <h1>Main Heading for SEO Test</h1>
        <h2>Subheading One</h2>
        <p>This is a paragraph with some content for testing purposes.</p>
        <h2>Subheading Two</h2>
        <p>Another paragraph with <a href="https://example.com/related">related content link</a>.</p>
        <h3>Level 3 Heading</h3>
        <p>More content here with an <a href="/internal-page">internal link</a>.</p>
        <img src="https://example.com/image.jpg" alt="Descriptive alt text">
        <img src="https://example.com/missing-alt.jpg">
    </main>
    <footer>
        <p>Copyright 2024 Example.com</p>
    </footer>
</body>
</html>
