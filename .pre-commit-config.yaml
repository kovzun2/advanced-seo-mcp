repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: bash -c "source .venv/bin/activate && pytest tests/ -q"
        language: system
        pass_filenames: false
        always_run: true
